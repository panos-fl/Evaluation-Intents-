<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snorkel AI — Engagement Hub</title>
<style>* { margin: 0; padding: 0; box-sizing: border-box; } body { -webkit-font-smoothing: antialiased; }</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ───────────────────────── Shared Components ───────────────────────── */

const CheckIcon = () => (<svg width="18" height="18" viewBox="0 0 18 18" fill="none" style={{ flexShrink: 0, marginTop: 2 }}><circle cx="9" cy="9" r="9" fill="#0f172a" /><path d="M5.5 9.5L7.5 11.5L12.5 6.5" stroke="#f8fafc" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" /></svg>);
const XIcon = () => (<svg width="18" height="18" viewBox="0 0 18 18" fill="none" style={{ flexShrink: 0, marginTop: 2 }}><circle cx="9" cy="9" r="9" fill="#dc2626" /><path d="M6 6L12 12M12 6L6 12" stroke="#f8fafc" strokeWidth="1.8" strokeLinecap="round" /></svg>);
const WarnIcon = () => (<svg width="18" height="18" viewBox="0 0 18 18" fill="none" style={{ flexShrink: 0, marginTop: 2 }}><circle cx="9" cy="9" r="9" fill="#d97706" /><path d="M9 5.5V10" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" /><circle cx="9" cy="12.5" r="1" fill="#fff" /></svg>);
const SectionLabel = ({ children }) => (<div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: 2, color: "#2563eb", textTransform: "uppercase", marginBottom: 16, paddingBottom: 8, borderBottom: "1px solid #e2e8f0" }}>{children}</div>);

const PhaseCard = ({ number, title, description, outputs }) => (
  <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 10, padding: "28px 28px 24px", position: "relative", overflow: "hidden" }}>
    <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: "#0f172a" }} />
    <div style={{ marginBottom: 6 }}>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: "#94a3b8", letterSpacing: 1 }}>PHASE {number}</span>
    </div>
    <h3 style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 22, fontWeight: 400, color: "#0f172a", margin: "0 0 12px" }}>{title}</h3>
    <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, lineHeight: 1.65, color: "#475569", margin: "0 0 16px" }}>{description}</p>
    {outputs && (<div style={{ borderTop: "1px solid #e2e8f0", paddingTop: 14 }}>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "#94a3b8", letterSpacing: 1.5, textTransform: "uppercase" }}>Deliverables</span>
      <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 6 }}>
        {outputs.map((o, i) => (<div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 8 }}><span style={{ color: "#2563eb", fontSize: 14, marginTop: 1 }}>→</span><span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#334155", lineHeight: 1.5 }}>{o}</span></div>))}
      </div>
    </div>)}
  </div>
);

const DimCard = ({ icon, title, subtitle, items, color }) => (
  <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 10, padding: "24px 24px 20px", position: "relative", overflow: "hidden" }}>
    <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: color || "#0f172a" }} />
    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
      <span style={{ fontSize: 20 }}>{icon}</span>
      <h3 style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 20, fontWeight: 400, color: "#0f172a", margin: 0 }}>{title}</h3>
    </div>
    <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#94a3b8", margin: "0 0 14px", lineHeight: 1.5 }}>{subtitle}</p>
    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
      {items.map((it, i) => (<div key={i} style={{ display: "flex", gap: 8, alignItems: "flex-start" }}><span style={{ color: "#2563eb", fontSize: 12, marginTop: 3, flexShrink: 0 }}>●</span><span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#475569", lineHeight: 1.55 }}>{it}</span></div>))}
    </div>
  </div>
);

const BulletList = ({ items }) => (<div style={{ display: "flex", flexDirection: "column", gap: 14 }}>{items.map((it, i) => (<div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}><span style={{ color: "#2563eb", fontSize: 14, marginTop: 2, flexShrink: 0 }}>→</span><span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: "#475569", lineHeight: 1.6 }}>{it}</span></div>))}</div>);
const FlagList = ({ items }) => (<div style={{ display: "flex", flexDirection: "column", gap: 10 }}>{items.map((it, i) => (<div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}><span style={{ color: "#dc2626", fontWeight: 700, fontSize: 16, marginTop: -1, flexShrink: 0 }}>⚑</span><span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#475569", lineHeight: 1.6 }}>{it}</span></div>))}</div>);

const DeliverableBox = ({ items }) => (
  <div style={{ background: "#0f172a", borderRadius: 10, padding: "32px 32px 28px", marginBottom: 48 }}>
    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: 2, color: "#2563eb", textTransform: "uppercase", marginBottom: 20 }}>What you walk away with</div>
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
      {items.map((it, i) => (<div key={i} style={{ display: "flex", alignItems: "center", gap: 10, fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: "#e2e8f0" }}><span style={{ color: "#2563eb" }}>◆</span>{it}</div>))}
    </div>
  </div>
);

const TimelineBox = ({ weeks, detail }) => (
  <div style={{ background: "#f1f5f9", borderRadius: 10, border: "1px solid #e2e8f0", padding: "24px 28px" }}>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <div>
        <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: 2, color: "#2563eb", textTransform: "uppercase", marginBottom: 6 }}>Typical timeline</div>
        <div style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 28, color: "#0f172a" }}>{weeks}</div>
      </div>
      <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#94a3b8", textAlign: "right", lineHeight: 1.5 }}>{detail}</div>
    </div>
  </div>
);

const TIER_MAP = {
  S: { label: "Targeted", color: "#059669", bg: "#dcfce7", fill: "rgba(74, 136, 74, 0.12)" },
  M: { label: "Substantial", color: "#2563eb", bg: "#dbeafe", fill: "rgba(74, 111, 165, 0.15)" },
  L: { label: "Comprehensive", color: "#d97706", bg: "#fef3c7", fill: "rgba(196, 121, 10, 0.15)" },
  XL: { label: "Transformative", color: "#dc2626", bg: "#fee2e2", fill: "rgba(180, 50, 50, 0.12)" },
};

const ClientSizing = ({ dataDims, systemDims, matrix, note }) => {
  // Heat intensity: 0 (lightest) to 4 (deepest)
  const heatColors = [
    "rgba(15, 23, 42, 0.04)",
    "rgba(15, 23, 42, 0.09)",
    "rgba(15, 23, 42, 0.16)",
    "rgba(15, 23, 42, 0.26)",
    "rgba(15, 23, 42, 0.40)",
  ];
  const heatText = [
    "#94a3b8", "#64748b", "#475569", "#1e293b", "#fff",
  ];

  return (
    <div>
      <SectionLabel>Scope & investment</SectionLabel>
      <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, lineHeight: 1.7, color: "#64748b", maxWidth: 640, margin: "0 0 24px" }}>
        Engagement scope is determined by two factors: how complex your data requirements are, and how complex your system is. Both matter — a simple system with safety-critical data needs can require more work than a complex system with low-stakes outputs.
      </p>

      {/* Two axis overview */}
      <div style={{ display: "flex", gap: 16, marginBottom: 24 }}>
        <div style={{ flex: 1, background: "#0f172a", borderRadius: 10, padding: "20px 18px" }}>
          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: 1.5, color: "#2563eb", textTransform: "uppercase", marginBottom: 12 }}>Data Complexity</div>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#94a3b8", lineHeight: 1.5, marginBottom: 14 }}>How much data work is required for the system to perform well?</div>
          {dataDims.map((d, i) => (
            <div key={i} style={{ display: "flex", gap: 8, alignItems: "flex-start", marginBottom: 8 }}>
              <span style={{ color: "#2563eb", fontSize: 10, marginTop: 4, flexShrink: 0 }}>●</span>
              <div>
                <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 600, color: "#f8fafc", marginBottom: 1 }}>{d.name}</div>
                <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#94a3b8", lineHeight: 1.4 }}>{d.spectrum}</div>
              </div>
            </div>
          ))}
        </div>
        <div style={{ flex: 1, background: "#fff", border: "1px solid #e2e8f0", borderRadius: 10, padding: "20px 18px" }}>
          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: 1.5, color: "#2563eb", textTransform: "uppercase", marginBottom: 12 }}>System Complexity</div>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#94a3b8", lineHeight: 1.5, marginBottom: 14 }}>How architecturally complex is the system itself?</div>
          {systemDims.map((d, i) => (
            <div key={i} style={{ display: "flex", gap: 8, alignItems: "flex-start", marginBottom: 8 }}>
              <span style={{ color: "#2563eb", fontSize: 10, marginTop: 4, flexShrink: 0 }}>●</span>
              <div>
                <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 600, color: "#0f172a", marginBottom: 1 }}>{d.name}</div>
                <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#94a3b8", lineHeight: 1.4 }}>{d.spectrum}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Heat map matrix */}
      <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 10, padding: 24, marginBottom: 20 }}>
        <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: 1.5, color: "#2563eb", textTransform: "uppercase", marginBottom: 20 }}>How they combine</div>
        <div style={{ display: "grid", gridTemplateColumns: "90px 1fr 1fr 1fr", gap: 0 }}>
          <div />
          {["Lower", "Moderate", "Higher"].map(h => (
            <div key={h} style={{ padding: "10px", textAlign: "center", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "#94a3b8", letterSpacing: 0.5 }}>
              {h}<br/><span style={{ fontSize: 9, color: "#cbd5e1" }}>system complexity</span>
            </div>
          ))}
          {["Lower", "Moderate", "Higher"].map((row, ri) => (<>
            <div key={`l-${ri}`} style={{ padding: "10px 8px", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "#94a3b8", display: "flex", alignItems: "center", lineHeight: 1.3 }}>
              {row}<br/><span style={{ fontSize: 9, color: "#cbd5e1" }}>data complexity</span>
            </div>
            {[0, 1, 2].map(ci => {
              const cell = matrix[ri][ci];
              const tier = TIER_MAP[cell.size];
              const intensity = ri + ci;
              return (
                <div key={`c-${ri}-${ci}`} style={{
                  padding: "16px 10px",
                  textAlign: "center",
                  background: heatColors[intensity],
                  borderRadius: 6,
                  margin: 3,
                  transition: "all 0.2s ease",
                }}>
                  <span style={{
                    fontFamily: "'Instrument Serif', Georgia, serif",
                    fontSize: 14,
                    color: heatText[intensity],
                    fontWeight: 400,
                  }}>{tier.label}</span>
                </div>
              );
            })}
          </>))}
        </div>
      </div>

      {/* Legend */}
      <div style={{ display: "flex", gap: 12, marginBottom: 20 }}>
        {["S", "M", "L", "XL"].map(k => {
          const t = TIER_MAP[k];
          return (
            <div key={k} style={{ flex: 1, display: "flex", alignItems: "center", gap: 8, padding: "10px 12px", background: t.fill, borderRadius: 6, border: `1px solid ${t.color}20` }}>
              <div style={{ width: 10, height: 10, borderRadius: "50%", background: t.color, flexShrink: 0 }} />
              <div>
                <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 600, color: t.color }}>{t.label}</div>
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#94a3b8", lineHeight: 1.6, padding: "12px 16px", background: "#f1f5f9", borderRadius: 8, border: "1px solid #e2e8f0" }}>
        <strong style={{ color: "#475569" }}>Key insight:</strong> A simple system with high data complexity — such as a single agent writing to an EHR in a safety-critical workflow — can require as much or more investment as an architecturally complex system with lower data stakes. The data work scales with what's at risk, not just what's built.
      </div>
      {note && <div style={{ marginTop: 16, fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#94a3b8", lineHeight: 1.6, fontStyle: "italic" }}>{note}</div>}
    </div>
  );
};

const DATA_DIMS = [
  { name: "Interaction Depth", spectrum: "Single-turn → multi-turn → multi-turn with tool use" },
  { name: "System of Record Impact", spectrum: "Read-only → read-write → read-write in regulated systems" },
  { name: "Error Tolerance", spectrum: "Low-stakes → high-stakes → safety-critical" },
  { name: "Workflow Specialization", spectrum: "General → specialized → highly specialized / credentialed" },
];

const Hero = ({ title, subtitle, breakTitle }) => (
  <div style={{ marginBottom: 48 }}>
    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: 3, color: "#2563eb", textTransform: "uppercase", marginBottom: 12 }}>Snorkel AI · Engagement Model</div>
    <h1 style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 42, fontWeight: 400, color: "#0f172a", margin: "0 0 16px", lineHeight: 1.15 }} dangerouslySetInnerHTML={{ __html: breakTitle || title }} />
    <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 17, lineHeight: 1.7, color: "#475569", maxWidth: 640, margin: 0 }}>{subtitle}</p>
  </div>
);

const InternalHero = ({ badge, title }) => (
  <div style={{ marginBottom: 40 }}>
    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: 3, color: "#dc2626", textTransform: "uppercase", marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
      <span style={{ background: "#dc2626", color: "#fff", fontSize: 9, padding: "2px 6px", borderRadius: 3, letterSpacing: 1 }}>INTERNAL</span>{badge}
    </div>
    <h1 style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 36, fontWeight: 400, color: "#0f172a", margin: "0 0 12px", lineHeight: 1.2 }}>{title}</h1>
  </div>
);

const GateCard = ({ gate, pass, fail, failLabel }) => (
  <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, padding: 20 }}>
    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: "#0f172a", fontWeight: 600, marginBottom: 12 }}>{gate}</div>
    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
      <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}><CheckIcon /><span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#475569", lineHeight: 1.6 }}><strong style={{ color: "#0f172a" }}>Route here:</strong> {pass}</span></div>
      <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}><XIcon /><span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#475569", lineHeight: 1.6 }}><strong style={{ color: "#dc2626" }}>{failLabel}:</strong> {fail}</span></div>
    </div>
  </div>
);

const ScopeTier = ({ size, weeks, color, desc, team, acv }) => (
  <div style={{ flex: 1, background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, padding: 20, position: "relative", overflow: "hidden" }}>
    <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: color }} />
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
      <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: 1, color, textTransform: "uppercase" }}>{size}</div>
      {acv && <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "#2563eb" }}>{acv}</div>}
    </div>
    <div style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 22, color: "#0f172a", marginBottom: 10 }}>{weeks}</div>
    <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#64748b", lineHeight: 1.6, margin: "0 0 12px" }}>{desc}</p>
    <div style={{ borderTop: "1px solid #e2e8f0", paddingTop: 10 }}>
      <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "#94a3b8", letterSpacing: 1, textTransform: "uppercase", marginBottom: 4 }}>Typical Team</div>
      <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#475569", lineHeight: 1.5 }}>{team}</div>
    </div>
  </div>
);

const ProfileBox = ({ items }) => (<div style={{ background: "#f1f5f9", border: "1px solid #e2e8f0", borderRadius: 8, padding: 24 }}>{items.map((it, i) => (<p key={i} style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: "#475569", lineHeight: 1.7, margin: i < items.length - 1 ? "0 0 12px" : 0 }}><strong>{it.label}:</strong> {it.text}</p>))}</div>);
const QBlock = ({ area, questions }) => (<div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, padding: "16px 20px" }}><div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: 1, color: "#2563eb", textTransform: "uppercase", marginBottom: 10 }}>{area}</div><div style={{ display: "flex", flexDirection: "column", gap: 4 }}>{questions.map((q, j) => (<div key={j} style={{ display: "flex", gap: 8, alignItems: "flex-start" }}><span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#cbd5e1" }}>→</span><span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#475569", lineHeight: 1.5 }}>{q}</span></div>))}</div></div>);
const ConvCard = ({ from, signal, color }) => (<div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, padding: "16px 20px", borderLeft: `4px solid ${color}`, marginBottom: 12 }}><div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: 1, color, marginBottom: 6 }}>{from}</div><div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#475569", lineHeight: 1.6 }}>{signal}</div></div>);
const FindingCard = ({ category, color, findings }) => (<div style={{ marginBottom: 20 }}><div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: 1.5, color, textTransform: "uppercase", marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}><span style={{ width: 8, height: 8, borderRadius: "50%", background: color, display: "inline-block" }} />{category}</div><div style={{ display: "flex", flexDirection: "column", gap: 8 }}>{findings.map((f, i) => (<div key={i} style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 6, padding: "12px 16px" }}><div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600, color: "#0f172a", marginBottom: 3 }}>{f.finding}</div><div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#64748b", lineHeight: 1.5 }}>{f.implication}</div></div>))}</div></div>);

const EngagementContinuum = ({ active }) => (
  <div style={{ background: "#0f172a", borderRadius: 10, padding: 28 }}>
    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: 2, color: "#2563eb", textTransform: "uppercase", marginBottom: 16 }}>Engagement Continuum</div>
    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
      {[{ name: "Data Production Accelerator", desc: "Client owns spec. We produce data.", id: "dpa" },{ name: "Data-Centric System Diagnostic & Remediation", desc: "Diagnose gaps, refine specs, remediate.", id: "sdr" },{ name: "Data-Centric Custom Agent Build", desc: "Greenfield agent + data infrastructure.", id: "cab" },{ name: "Managed Evaluation Service", desc: "Ongoing evaluation as a service.", id: "mes" },{ name: "Data-Centric Agent Pilot", desc: "Validate approach before full build.", id: "ap" },{ name: "Data-Centric Guardrail Development", desc: "Build safety & boundary layer.", id: "gd" }].map((it, i) => (
        <div key={i} style={{ flex: "1 1 130px", background: it.id === active ? "#1e293b" : "transparent", border: `1px solid ${it.id === active ? "#2563eb" : "#334155"}`, borderRadius: 8, padding: "12px 10px" }}>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, fontWeight: 600, color: it.id === active ? "#f8fafc" : "#64748b", marginBottom: 3 }}>{it.name}</div>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, color: it.id === active ? "#2563eb" : "#475569", lineHeight: 1.4 }}>{it.desc}</div>
        </div>
      ))}
    </div>
  </div>
);


/* ═══════════════════ 1. DATA PRODUCTION ACCELERATOR ═══════════════════ */

const DPA_Client = () => (
  <div>
    <Hero title="Data Production Accelerator" subtitle="A fixed-scope sprint to produce production-grade datasets — evaluation data, fine-tuning training data, or RL preference data — built against your specifications by domain experts. Whether the expertise comes from your team, ours, or a blend of both, we provide the methodology, tooling, and calibration to make it production-grade." />
    <div style={{ marginBottom: 48 }}><SectionLabel>When this is right for you</SectionLabel><p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 15, lineHeight: 1.7, color: "#475569", maxWidth: 640, margin: 0 }}>You've defined what quality looks like and you know exactly what data you need. You need an expert team to produce it at scale — with the annotation rigor, domain credentialing, and calibration methodology to make it production-grade.</p></div>
    <div style={{ marginBottom: 48 }}>
      <SectionLabel>Three modes, one methodology</SectionLabel>
      <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, lineHeight: 1.7, color: "#64748b", maxWidth: 640, margin: "0 0 24px" }}>The methodology is the same — onboard specs, calibrate annotators, produce data at scale with quality controls. What differs is the output schema and what the data is for.</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        {[{ mode: "Evaluation Data", color: "#0f172a", desc: "Ground truth datasets for measuring system quality. Structured labels, error tags, severity ratings, and justifications — built against your evaluation rubric.", ex: "Error-annotated outputs, pass/fail scoring, pairwise preferences, human-graded responses" },

                        <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: SIZE_COLORS[s] }} />
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <span style={{
                              fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, fontWeight: 700,
                              color: "#fff", background: SIZE_COLORS[s],
                              width: 28, height: 28, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center",
                            }}>{s}</span>
                            <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 600, color: "#0f172a" }}>{SIZE_LABELS[s]}</span>
                          </div>
                          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: SIZE_COLORS[s] }}>{data.timeline}</span>
                        </div>

                        <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "#94a3b8", letterSpacing: 1, textTransform: "uppercase", marginBottom: 4, marginTop: 12 }}>Team</div>
                        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#475569", marginBottom: 12 }}>{data.team}</div>

                        <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "#94a3b8", letterSpacing: 1, textTransform: "uppercase", marginBottom: 4 }}>Sizing drivers</div>
                        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#64748b", lineHeight: 1.5, marginBottom: 12 }}>{data.drivers}</div>

                        <div style={{
                          background: isSelected ? "#fff" : "#f1f5f9",
                          borderRadius: 6, padding: "10px 12px", border: "1px solid #e2e8f0",
                        }}>
                          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: SIZE_COLORS[s], letterSpacing: 1, textTransform: "uppercase", marginBottom: 4 }}>Representative deal</div>
                          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#475569", lineHeight: 1.55 }}>{data.example}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        ))}
      </div>

      <div style={{ marginBottom: 40 }}>
        <SectionLabel>Quick-reference sizing matrix</SectionLabel>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "'DM Sans', sans-serif", fontSize: 11 }}>
            <thead>
              <tr>
                <th style={{ textAlign: "left", padding: "10px 12px", borderBottom: "2px solid #0f172a", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: 1, color: "#94a3b8", textTransform: "uppercase", minWidth: 160 }}>Engagement</th>
                {SIZES.map(s => (
                  <th key={s} style={{ textAlign: "center", padding: "10px 12px", borderBottom: `2px solid ${SIZE_COLORS[s]}`, fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: SIZE_COLORS[s], minWidth: 100 }}>{SIZE_LABELS[s]}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {Object.entries(sizingData).map(([engId, eng], i) => (
                <tr key={engId} style={{ background: i % 2 === 0 ? "#fff" : "#f1f5f9" }}>
                  <td style={{ padding: "10px 12px", fontWeight: 600, color: "#0f172a", borderBottom: "1px solid #e2e8f0", fontSize: 12 }}>{eng.name}</td>
                  {SIZES.map(s => (
                    <td key={s} style={{ padding: "10px 12px", textAlign: "center", borderBottom: "1px solid #e2e8f0", color: "#475569" }}>
                      <div style={{ fontWeight: 600, color: SIZE_COLORS[s], marginBottom: 2 }}>{eng.sizes[s].timeline}</div>
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <div style={{ background: "#0f172a", borderRadius: 10, padding: 24 }}>
        <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: 2, color: "#2563eb", textTransform: "uppercase", marginBottom: 12 }}>How to use this guide</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {[
            "During initial qualification, map the deal against the universal drivers table to get an approximate size (S/M/L/XL).",
            "Click into the relevant engagement type to find the representative deal that most closely matches your opportunity.",
            "Use the timeline and team composition as starting points for SOW scoping — then refine with the detailed per-engagement scoping in each Internal Playbook.",
            "If a deal spans multiple engagements (e.g., SD&R that will convert to Custom Agent Build), size each phase independently.",
            "When in doubt, size up. It's easier to come in under budget than to ask for more mid-engagement.",
          ].map((it, i) => (
            <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: "#2563eb", marginTop: 1 }}>{i + 1}.</span>
              <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#cbd5e1", lineHeight: 1.6 }}>{it}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};


const ENGAGEMENTS = [
  { id: "dpa", label: "Data Production Accelerator", cv: DPA_Client, iv: DPA_Internal },
  { id: "sdr", label: "Data-Centric System Diagnostic & Remediation", cv: SDR_Client, iv: SDR_Internal },
  { id: "cab", label: "Data-Centric Custom Agent Build", cv: CAB_Client, iv: CAB_Internal },
  { id: "mes", label: "Managed Evaluation Service", cv: MES_Client, iv: MES_Internal },
  { id: "ap", label: "Data-Centric Agent Pilot", cv: AP_Client, iv: AP_Internal },
  { id: "gd", label: "Data-Centric Guardrail Development", cv: GD_Client, iv: GD_Internal },
];

function EngagementHub() {
  const [ae, setAe] = useState(0);
  const [av, setAv] = useState(0);
  const [showSizing, setShowSizing] = useState(false);
  const e = ENGAGEMENTS[ae];
  const C = av === 0 ? e.cv : e.iv;
  return (
    <div style={{ minHeight: "100vh", background: "#f8fafc", fontFamily: "'DM Sans', sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet" />
      <div style={{ position: "sticky", top: 0, zIndex: 10, background: "#f8fafc", borderBottom: "1px solid #e2e8f0" }}>
        <div style={{ display: "flex", gap: 0, padding: "12px 24px 0", borderBottom: "1px solid #e2e8f0", overflowX: "auto" }}>
          {ENGAGEMENTS.map((eng, i) => (
            <button key={eng.id} onClick={() => { setAe(i); setAv(0); setShowSizing(false); }}
              style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: !showSizing && ae === i ? 600 : 400, color: !showSizing && ae === i ? "#0f172a" : "#94a3b8", background: "none", border: "none", borderBottom: !showSizing && ae === i ? "2px solid #0f172a" : "2px solid transparent", padding: "8px 14px 12px", cursor: "pointer", whiteSpace: "nowrap" }}>
              {eng.label}
            </button>))}
          <button onClick={() => setShowSizing(true)}
            style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: showSizing ? 600 : 400, color: showSizing ? "#dc2626" : "#94a3b8", background: "none", border: "none", borderBottom: showSizing ? "2px solid #dc2626" : "2px solid transparent", padding: "8px 14px 12px", cursor: "pointer", whiteSpace: "nowrap", marginLeft: "auto", display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ background: "#dc2626", color: "#fff", fontSize: 8, padding: "1px 5px", borderRadius: 2, letterSpacing: 0.5 }}>INT</span>Sizing Guide
          </button>
        </div>
        {!showSizing && (
          <div style={{ display: "flex", gap: 0, padding: "0 24px" }}>
            {["Client Overview", "Internal Playbook"].map((tab, i) => (
              <button key={tab} onClick={() => setAv(i)}
                style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: 1, color: av === i ? "#0f172a" : "#cbd5e1", background: "none", border: "none", borderBottom: av === i ? "2px solid #2563eb" : "2px solid transparent", padding: "10px 16px", cursor: "pointer" }}>
                {i === 1 && <span style={{ background: "#dc2626", color: "#fff", fontSize: 8, padding: "1px 5px", borderRadius: 2, marginRight: 6, verticalAlign: "middle" }}>INT</span>}{tab}
              </button>))}
          </div>
        )}
      </div>
      <div style={{ maxWidth: showSizing ? 960 : 780, margin: "0 auto", padding: "48px 40px 80px", transition: "max-width 0.3s ease" }}>
        {showSizing ? <SizingGuide /> : <C />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(React.StrictMode, null, React.createElement(EngagementHub))
);
</script>
</body>
</html>
